<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <title>E-Commerce</title>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow-sm">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand fw-bold" href="#">
            ShopEasy
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar">

            <!-- Search -->
            <form class="d-flex mx-auto w-50">
                <input class="form-control me-2" type="search" placeholder="Search products..." data-bs-toggle="offcanvas" data-bs-target="#searchCavas">
                <button class="btn btn-warning">
                    <i class="bi bi-search"></i>
                </button>
            </form>

            <!-- Right Menu -->
            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item me-3">
                    <a href="#" class="nav-link">
                        <i class="bi bi-heart fs-5"></i>
                        Wishlist
                    </a>
                </li>

                <li class="nav-item me-3">
                    <a href="#" class="nav-link position-relative">
                        <i class="bi bi-cart3 fs-5"></i>
                        Cart
                        
                    </a>
                </li>

                <li class="nav-item">
                    <button class="btn btn-warning">
                        Login
                    </button>
                </li>

            </ul>

        </div>

    </div>
</nav>
    <div class="container">
        <div class="row" id="showPro">
    </div>
    </div>


    <!-- search canvas -->
     <div class="offcanvas offcanvas-top" id="searchCavas" style="height: 650px;">
        <div class="offcanvas-header">
            <h2>Search</h2> <button class="btn-close"></button>
        </div>
        <div class="offcanvas-body">
            <form class="d-flex mx-auto w-50" onsubmit="searchFun(event)">
                <input class="form-control me-2" id="input" type="search" placeholder="Search products...">
                <button class="btn btn-warning">
                    <i class="bi bi-search"></i>
                </button>
            </form>
            <br><br>
            <div id="searchdata" class="row">

            </div>
        </div>
     </div>
</body>
<script src="../script/JSON.js"></script>
</html>
